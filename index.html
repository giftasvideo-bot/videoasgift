<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever 27 - Video Gift</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #progressBarContainer { width: 100%; background: #ddd; border-radius: 10px; margin: 20px 0; display: none; }
        #progressBar { width: 0%; height: 10px; background: #27ae60; border-radius: 10px; transition: width 0.3s; }
        button { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        .hidden { display: none; }
        #statusMessage { margin-top: 15px; font-weight: bold; color: #555; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; }
        input[type="file"] { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/150x50?text=Forever+27" alt="Forever 27" style="width: 150px; margin-bottom: 20px;">
    
    <h2 id="displayId">Syncing...</h2>

    <div id="uploadSection" class="hidden">
        <p>No video found for this gift yet.<br><strong>Upload yours now:</strong></p>
        <input type="file" id="videoInput" accept="video/*">
        <button onclick="uploadVideo()">Upload Video</button>
    </div>

    <div id="viewSection" class="hidden">
        <p>Your video gift is ready!</p>
        <video id="videoPlayer" controls>
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="progressBarContainer">
        <div id="progressBar"></div>
    </div>
    
    <p id="statusMessage"></p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const giftId = urlParams.get('id');
    
    // THE FULL URL FROM YOUR PREVIOUS MESSAGE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTwd-FafHoyaYkS7MagEJ13mEzOQb1p5ZATG-4r9fp-6Tgoh0oZlfYUhGAgpSh9pi-SQ/exec";
    const SUCCESS_URL = "https://your-canva-success-page.com";

    // 1. ON PAGE LOAD: Check if video exists
    window.onload = function() {
        if (!giftId) {
            document.getElementById('displayId').innerText = "❌ Error";
            document.getElementById('statusMessage').innerText = "Invalid Link. Please scan your QR code again.";
            return;
        }

        document.getElementById('displayId').innerText = "Gift ID: " + giftId;

        // Ask Google Script if this ID has a video link
        fetch(`${SCRIPT_URL}?id=${giftId}`)
            .then(response => response.json())
            .then(result => {
                if (result.url && result.url !== "") {
                    // IF VIDEO EXISTS: Show player
                    document.getElementById('viewSection').classList.remove('hidden');
                    document.getElementById('videoPlayer').src = result.url;
                } else {
                    // IF NO VIDEO: Show upload button
                    document.getElementById('uploadSection').classList.remove('hidden');
                }
            })
            .catch(err => {
                // If it can't connect, default to upload mode
                document.getElementById('uploadSection').classList.remove('hidden');
                console.log("New ID detected or connection error.");
            });
    };

    // 2. UPLOAD FUNCTION
    function uploadVideo() {
        const fileInput = document.getElementById('videoInput');
        if (fileInput.files.length === 0) return alert("Please select a video first!");

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        document.getElementById('uploadSection').classList.add('hidden');
        document.getElementById('progressBarContainer').style.display = 'block';
        document.getElementById('statusMessage').innerText = "Uploading to Forever 27... please wait.";

        reader.onload = function(e) {
            const base64String = e.target.result.split(',')[1];
            const payload = JSON.stringify({
                id: giftId,
                filename: file.name,
                mimeType: file.type,
                data: base64String
            });

            document.getElementById('progressBar').style.width = "90%";

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' },
                body: payload
            })
            .then(() => {
                document.getElementById('progressBar').style.width = "100%";
                document.getElementById('statusMessage').innerText = "✅ Success! Redirecting...";
                setTimeout(() => { window.location.href = SUCCESS_URL; }, 3000);
            })
            .catch(() => {
                document.getElementById('statusMessage').innerText = "❌ Upload Error. Try a smaller file or check connection.";
            });
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
