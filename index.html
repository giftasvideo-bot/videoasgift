<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever 27 | Video Gift Portal</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f8f9fa; --success: #00b894; --home: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .container { background: white; width: 100%; max-width: 450px; padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #636e72; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        #upload-section, #receiver-section, #error-section, #loading-section, #preview-section { display: none; }

        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; }
        video { width: 100%; display: block; object-fit: contain; min-height: 250px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 1.1rem; border-radius: 50px; font-weight: 600; width: 100%; cursor: pointer; font-size: 1rem; text-decoration: none; display: inline-block; box-sizing: border-box; margin-bottom: 10px; transition: 0.3s; }
        .btn-change { background: #636e72; font-size: 0.9rem; padding: 0.8rem; }
        
        #progress-container { display: none; width: 100%; background-color: #eee; border-radius: 50px; height: 12px; margin-top: 15px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--primary); transition: width 0.3s; }
        #status { margin-top: 1.5rem; font-size: 0.9rem; font-weight: 600; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Forever 27</div>
    <div class="subtitle">Design & Crafts</div>

    <div id="loading-section" style="display: block;"><p>Syncing...</p></div>

    <div id="upload-section">
        <p>Gift ID: <b id="displayId" style="color: var(--primary);"></b></p>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()" style="border: 2px dashed #dfe6e9; padding: 2rem; border-radius: 20px; cursor: pointer;">
            <span>Tap to select video</span>
            <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="previewVideo()">
        </div>
    </div>

    <div id="preview-section">
        <h3>Confirm Video</h3>
        <div class="video-wrapper"><video id="localPreview" controls playsinline></video></div>
        <button class="btn" onclick="uploadVideo()" id="uploadBtn">Send to Recipient</button>
        <button class="btn btn-change" onclick="document.getElementById('fileInput').click()">Change Video</button>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="receiver-section">
        <h3>A Gift for You! 🎁</h3>
        <div class="video-wrapper"><video id="cleanVideoPlayer" controls playsinline></video></div>
        <a href="https://videogifts.my.canva.site" class="btn">Visit Forever 27 Home</a>
    </div>

    <div id="error-section"><h3>Please Scan QR</h3></div>
    <div id="status"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const giftId = urlParams.get('id');
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbuY3b1i9pO9mMksOMYc3PlxfFrQlU1Glo7osxKVxE9Z51S1umoQCSDc9hjEygpDnrlQ/exec"; 
    const SUCCESS_URL = "https://videogifts.my.canva.site";

    window.onload = function() {
        if (!giftId) {
            hideAll();
            document.getElementById('error-section').style.display = 'block';
            return;
        }
        document.getElementById('displayId').innerText = giftId;

        fetch(`${SCRIPT_URL}?id=${giftId}`)
            .then(res => res.json())
            .then(data => {
                hideAll();
                if (data.url) {
                    document.getElementById('receiver-section').style.display = 'block';
                    document.getElementById('cleanVideoPlayer').src = data.url;
                } else {
                    document.getElementById('upload-section').style.display = 'block';
                }
            })
            .catch(() => {
                hideAll();
                document.getElementById('upload-section').style.display = 'block';
            });
    };

    function previewVideo() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            hideAll();
            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('localPreview').src = URL.createObjectURL(file);
        }
    }

    function uploadVideo() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        
        document.getElementById('uploadBtn').disabled = true;
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('status').innerText = "🚀 Uploading... do not close this page.";

        reader.onload = function(e) {
            const base64String = e.target.result.split(',')[1];
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({
                    id: giftId,
                    filename: file.name,
                    mimeType: file.type,
                    data: base64String
                })
            });

            let width = 0;
            const timer = setInterval(() => {
                width += 5;
                document.getElementById('progress-bar').style.width = width + "%";
                if (width >= 100) {
                    clearInterval(timer);
                    window.location.href = SUCCESS_URL;
                }
            }, 400); 
        };
        reader.readAsDataURL(file);
    }

    function hideAll() {
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('preview-section').style.display = 'none';
        document.getElementById('receiver-section').style.display = 'none';
        document.getElementById('error-section').style.display = 'none';
    }
</script>
</body>
</html>
