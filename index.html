<script>
    const urlParams = new URLSearchParams(window.location.search);
    const giftId = urlParams.get('id');
    
    // PASTE YOUR NEW DEPLOYMENT URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw71Q9wIJWnSO2-vfySXk_QCBcRlWuLPnjkFXrJBB4fMfaD7zi5ou2vjIuSujx_RNzkvg/exec"; 
    const SUCCESS_URL = "https://videogifts.my.canva.site";

    window.onload = function() {
        if (!giftId) {
            document.getElementById('displayId').innerText = "❌ No ID Found";
            return;
        }
        document.getElementById('displayId').innerText = "Gift ID: " + giftId;

        // Check if video already exists
        fetch(`${SCRIPT_URL}?id=${giftId}`)
            .then(res => res.json())
            .then(data => {
                if (data.url && data.url !== "") {
                    document.getElementById('viewSection').classList.remove('hidden');
                    document.getElementById('videoPlayer').src = data.url;
                    document.getElementById('displayId').innerText = "Your Gift is Ready!";
                } else {
                    document.getElementById('uploadSection').classList.remove('hidden');
                }
            })
            .catch(() => {
                // If Google is slow, just show the upload button anyway
                document.getElementById('uploadSection').classList.remove('hidden');
            });
    };

    function uploadVideo() {
        const fileInput = document.getElementById('videoInput');
        if (!fileInput.files[0]) return alert("Please select a video!");

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('progressBarContainer').style.display = 'block';
        document.getElementById('statusMessage').innerText = "🚀 Processing your video... please wait.";

        reader.onload = function(e) {
            const base64String = e.target.result.split(',')[1];
            
            // FIRE: Send data and ignore the browser's "security failure" signal
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    id: giftId,
                    filename: file.name,
                    mimeType: file.type,
                    data: base64String
                })
            });

            // FORGET: Instead of waiting for a "Failed" message, we start a countdown
            let width = 0;
            const timer = setInterval(() => {
                width += 5;
                document.getElementById('progressBar').style.width = width + "%";
                if (width >= 100) {
                    clearInterval(timer);
                    // Move to Canva regardless of what the browser says
                    window.location.href = SUCCESS_URL;
                }
            }, 500); // This takes 10 seconds total
        };
        reader.readAsDataURL(file);
    }
</script>
